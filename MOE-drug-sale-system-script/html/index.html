<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOE Trap Phone</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="phone" class="hidden">
        <div class="phone-shell">
            <div class="speaker"></div>

            <div class="screen">
                <div class="topbar">
                    <span>PREPAID</span>
                    <span id="time">12:00</span>
                </div>

                <div class="brand">
                    <div class="signal">▮▮▮</div>
                    <h1>MOE LINK</h1>
                    <p>burner network</p>
                </div>

                <div class="status-card">
                    <span>Network Status</span>
                    <strong id="status">READY</strong>
                </div>

                <button id="callBtn" class="call-btn">CALL CUSTOMER</button>
                <button id="bulkBtn" class="bulk-btn">BULK DELIVERY x2</button>
                <button id="statusBtn" class="small-btn">CHECK STATUS</button>
                <button id="closeBtn" class="end-btn">END</button>

                <div class="hint">
                    Vehicle required • Passenger seat open
                </div>
            </div>

            <div class="keypad">
                <div>1</div><div>2 ABC</div><div>3 DEF</div>
                <div>4 GHI</div><div>5 JKL</div><div>6 MNO</div>
                <div>7 PQRS</div><div>8 TUV</div><div>9 WXYZ</div>
                <div>*</div><div>0 +</div><div>#</div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
