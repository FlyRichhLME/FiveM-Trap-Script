<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trap Phone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="trap-phone">
        <div class="header">
            <span class="title">TRAP PHONE</span>
            <span id="status-label">STATUS: READY</span>
        </div>

        <div class="rep">
            <span id="rep-label">REP: Unknown</span>
        </div>

        <div class="buttons">
            <button id="btn-call">CALL CUSTOMER</button>
            <button id="btn-bulk">BULK DELIVERY</button>
            <button id="btn-delivery">GPS DELIVERY</button>
            <button id="btn-close">CLOSE</button>
        </div>

        <div class="log" id="log"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
