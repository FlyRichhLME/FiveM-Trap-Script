<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QBCore To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <div class="header">
                <h1>📝 My Tasks</h1>
                <button id="closeBtn" class="close-btn">✕</button>
            </div>

            <div class="input-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="todoInput" 
                        placeholder="Add a new task..." 
                        class="todo-input"
                        maxlength="255"
                    >
                    <select id="prioritySelect" class="input-select">
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                        <option value="Urgent">Urgent</option>
                    </select>
                    <select id="categorySelect" class="input-select">
                        <option value="Work">Work</option>
                        <option value="Personal">Personal</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Health">Health</option>
                        <option value="Home">Home</option>
                        <option value="Other" selected>Other</option>
                    </select>
                    <input 
                        type="date" 
                        id="dueDateInput" 
                        class="input-select"
                        title="Due Date (Optional)"
                    >
                    <button id="addBtn" class="add-btn">Add</button>
                </div>
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <div class="stats">
                <span class="stat-item">
                    Total: <strong id="totalCount">0</strong>
                </span>
                <span class="stat-item">
                    Done: <strong id="completedCount">0</strong>
                </span>
                <span class="stat-item">
                    Left: <strong id="remainingCount">0</strong>
                </span>
            </div>

            <div class="todos-section">
                <ul id="todoList" class="todo-list">
                    <!-- Tasks will be added here -->
                </ul>
                <div id="emptyState" class="empty-state">
                    <p>📭 No tasks yet. Add one to get started!</p>
                </div>
            </div>

            <div class="actions">
                <button id="clearCompleted" class="action-btn">Clear Completed</button>
                <button id="clearAll" class="action-btn danger">Clear All</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
